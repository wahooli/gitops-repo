apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-alerting
  namespace: flux-system
spec:
  interval: 5m0s
  prune: true
  dependsOn:
  - name: infrastructure-monitoring
  - name: infrastructure-logging
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/alerting/tpi-1
  healthChecks:
  - apiVersion: apps/v1
    kind: Deployment
    name: vmalert-vlogs-tpi-1
    namespace: alerting
  - apiVersion: apps/v1
    kind: Deployment
    name: vmalert-vmetrics-tpi-1
    namespace: alerting
  - apiVersion: apps/v1
    kind: StatefulSet
    name: vmalertmanager-tpi-1
    namespace: alerting
  postBuild:
    substituteFrom:
    - kind: Secret
      name: cluster-infrastructure-vars
      optional: false
    - kind: Secret
      name: cluster-vars
      optional: true
