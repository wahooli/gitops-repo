apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-core
  namespace: flux-system
spec:
  interval: 5m0s
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/core/tpi-1
  healthChecks:
  - apiVersion: apps/v1
    kind: Deployment
    name: cert-manager
    namespace: cert-manager
  - apiVersion: apps/v1
    kind: Deployment
    name: victoria-metrics-operator
    namespace: victoria-metrics
  postBuild:
    substituteFrom:
    - kind: Secret
      name: cluster-infrastructure-vars
      optional: false
    - kind: Secret
      name: cluster-vars
      optional: true
    - kind: Secret
      name: dns-vars
      optional: true
