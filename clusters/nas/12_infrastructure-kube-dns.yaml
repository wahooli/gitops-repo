apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-kube-dns
  namespace: flux-system
spec:
  interval: 5m0s
  prune: false
  dependsOn:
  - name: infrastructure-dns
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/kube-dns/nas
  healthChecks:
  - apiVersion: apps/v1
    kind: Deployment
    name: coredns
    namespace: kube-system
  postBuild:
    substitute:
      coredns_replicas: "1"
    substituteFrom:
    - kind: Secret
      name: dns-vars
      optional: false
    - kind: Secret
      name: cluster-vars
      optional: true
