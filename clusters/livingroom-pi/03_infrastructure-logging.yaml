apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-logging
  namespace: flux-system
spec:
  interval: 5m0s
  prune: true
  dependsOn:
  - name: infrastructure-platform
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/logging/livingroom-pi
  healthChecks:
  - apiVersion: apps/v1
    kind: DaemonSet
    name: vector-agent
    namespace: logging
  postBuild:
    substituteFrom:
    - kind: Secret
      name: cluster-infrastructure-vars
      optional: false
    - kind: Secret
      name: cluster-vars
      optional: true
