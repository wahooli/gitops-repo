apiVersion: v1
kind: ConfigMap
metadata:
  name: ingress-nginx-helmrelease-overrides
  namespace: flux-system
data:
  values.yaml: |
    controller:
      admissionWebhooks:
        enabled: false
      config:
        use-proxy-protocol: "false"
        ssl-redirect: "false"
      service:
        externalTrafficPolicy: ""
        annotations:
          lbipam.cilium.io/ips: null
