apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-platform
spec:
  patches:
  - target:
      kind: Gateway
      name: envoy-gw
    patch: |
      - op: remove
        path: /spec/infrastructure/annotations/lbipam.cilium.io~1ips
      - op: remove
        path: /spec/listeners/1
      - op: replace
        path: /spec/listeners/0/port
        value: 8080
  - target:
      kind: Gateway
      name: envoy-gw-private
    patch: |
      - op: remove
        path: /spec/infrastructure/annotations/lbipam.cilium.io~1ips
      - op: remove
        path: /spec/infrastructure/annotations/external-dns.alpha.kubernetes.io~1hostname
      - op: remove
        path: /spec/listeners/3
      - op: remove
        path: /spec/listeners/2
      - op: remove
        path: /spec/listeners/1
      - op: replace
        path: /spec/listeners/0/port
        value: 8081
  - target:
      kind: HTTPRoute
      name: envoy-gw-private-https-redirect
    patch: |
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: envoy-gw-private-https-redirect
      $patch: delete
  - target:
      kind: ClientTrafficPolicy
    patch: |
      apiVersion: gateway.envoyproxy.io/v1alpha1
      kind: ClientTrafficPolicy
      metadata:
        name: unused
      $patch: delete
