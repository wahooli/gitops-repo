apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-platform
spec:
  patches:
  - target:
      kind: CiliumLoadBalancerIPPool
      name: lb-pool
    patch: |
      - op: add
        path: /spec/disabled
        value: true
  - target:
      kind: CiliumLoadBalancerIPPool
      name: internal-dns-ip-pool
    patch: |
      - op: add
        path: /spec/disabled
        value: true
