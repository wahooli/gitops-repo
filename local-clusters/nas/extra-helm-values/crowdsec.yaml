apiVersion: v1
kind: ConfigMap
metadata:
  name: crowdsec-helmrelease-overrides
  namespace: flux-system
data:
  values.yaml: |
    agent:
      resources:
        limits:
          cpu: 100m
          memory: 128Mi
        requests:
          cpu: 10m
          memory: 64Mi
      env:
      - name: DISABLE_ONLINE_API
        value: "true"
      - name: CROWDSEC_BYPASS_DB_VOLUME_CHECK
        value: "TRUE"

    lapi:
      resources:
        limits:
          cpu: 200m
          memory: 256Mi
        requests:
          cpu: 10m
          memory: 128Mi
      env:
      - name: DISABLE_ONLINE_API
        value: "true"
      - name: DB_PASSWORD
        value: password
