apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-depends
spec:
  patches:
  - target:
      kind: Gateway
      name: internal-gw
    patch: |
      - op: remove
        path: /spec/infrastructure/annotations/lbipam.cilium.io~1ips
      - op: remove
        path: /spec/listeners/3
      - op: remove
        path: /spec/listeners/2
      - op: remove
        path: /spec/listeners/1
      - op: replace
        path: /spec/listeners/0/port
        value: 8080
  - target:
      kind: HTTPRoute
      name: https-redirect-filter
    patch: |
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: https-redirect-filter
      $patch: delete
