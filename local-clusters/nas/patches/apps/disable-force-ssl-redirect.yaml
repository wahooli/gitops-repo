apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
spec:
  patches:
  - target:
      kind: Ingress
    patch: |
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: unused
        annotations:
          nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
  - target:
      kind: HelmRelease
    patch: |
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: unused
      spec:
        postRenderers:
        - kustomize:
            patches:
            - target:
                kind: Ingress
              patch: |
                apiVersion: networking.k8s.io/v1
                kind: Ingress
                metadata:
                  name: unused
                  annotations:
                    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
