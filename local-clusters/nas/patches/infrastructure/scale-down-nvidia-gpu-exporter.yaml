# yaml-language-server: $schema=https://json-schema.org/draft/2020-12/schema
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
spec:
  patches:
  - target:
      kind: Deployment
      name: nvidia-gpu-exporter
    patch: |
      - op: replace
        path: /spec/replicas
        value: 0
