apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-platform
spec:
  patches:
  - target:
      kind: ConfigMap
      name: "zot-config.*"
    patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: unused
      data:
        config.json: |
          {
            "distSpecVersion": "1.1.0",
            "storage": {
              "dedupe": false,
              "rootDirectory": "/var/lib/registry",
              "storageDriver": {
                "name": "s3",
                "regionendpoint": "http://seaweedfs-filer-lb.seaweedfs.svc.cluster.local:8333",
                "region": "us-east-1",
                "bucket": "zot-registry",
                "accesskey": "${seaweedfs_zot_access_key}",
                "secretkey": "${seaweedfs_zot_secret_key}",
                "secure": false,
                "skipverify": true
              },
              "gc": true,
              "gcDelay": "1h",
              "gcInterval": "24h",
              "subPaths": {
                "/docker": { "rootDirectory": "/var/lib/registry/cache/docker" },
                "/ghcr": { "rootDirectory": "/var/lib/registry/cache/ghcr" },
                "/quay": { "rootDirectory": "/var/lib/registry/cache/quay" }
              }
            },
            "http": {
              "address": "0.0.0.0",
              "port": "5000",
              "accessControl": {
                "repositories": {
                  "**": {
                    "anonymousPolicy": ["read", "create", "update", "delete"]
                  }
                }
              }
            },
            "extensions": {
              "search": { "enable": true },
              "ui": { "enable": true },
              "sync": {
                "downloadDir": "/tmp/zot-sync",
                "credentialsFile": "/etc/zot/credentials/sync-credentials.json",
                "registries": [
                  {
                    "urls": ["https://registry-1.docker.io"],
                    "content": [{ "prefix": "**", "destination": "/docker" }],
                    "onDemand": true
                  },
                  {
                    "urls": ["https://ghcr.io"],
                    "content": [{ "prefix": "**", "destination": "/ghcr" }],
                    "onDemand": true
                  },
                  {
                    "urls": ["https://quay.io"],
                    "content": [{ "prefix": "**", "destination": "/quay" }],
                    "onDemand": true
                  }
                ]
              }
            },
            "log": {
              "level": "warn"
            }
          }
