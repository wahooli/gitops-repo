apiVersion: v1
kind: ConfigMap
metadata:
  name: haproxy-helmrelease-overrides
  namespace: flux-system
data:
  values.yaml: |
    certificates:
      wildcard:
        issuerRef:
          name: selfsigned-ca
          kind: ClusterIssuer
    service:
      main:
        externalTrafficPolicy: ""
        type: ClusterIP
