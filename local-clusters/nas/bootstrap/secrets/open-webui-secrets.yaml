apiVersion: v1
kind: Secret
metadata:
  name: open-webui-openai-keys
  namespace: open-webui
type: Opaque
stringData:
  # Semicolon-separated keys, one per entry in openaiBaseApiUrls (same order):
  #   1. assist-llm-router  — in-cluster, no auth → placeholder
  #   2. hermes-agent       — must equal API_SERVER_KEY in hermes-agent-secrets
  keys: "not-needed;replace-me-with-the-API_SERVER_KEY-from-hermes-agent-secrets"
