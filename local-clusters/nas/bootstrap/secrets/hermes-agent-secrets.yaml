---
apiVersion: v1
kind: Secret
metadata:
  name: hermes-agent-secrets
  namespace: hermes-agent
type: Opaque
stringData:
  # Hermes refuses to start the API server unless API_SERVER_KEY is set
  # (≥8 chars). Generate with: openssl rand -hex 32
  # The same value must appear in open-webui-openai-keys.keys (slot 2).
  API_SERVER_KEY: "replace-me-with-openssl-rand-hex-32"
  # Required by the openai SDK constructor; the cluster-local Qwen
  # endpoint is unauthenticated so any non-empty value works.
  OPENAI_API_KEY: "not-needed"
---
apiVersion: v1
kind: Secret
metadata:
  name: hermes-agent-api-keys
  namespace: hermes-agent
type: Opaque
stringData:
  # Tokens consumed by Envoy SecurityPolicy apiKeyAuth (raw — do NOT prefix
  # with "Bearer "). Add one entry per client.
  default: "replace-me-with-a-random-token"
