apiVersion: operator.victoriametrics.com/v1beta1
kind: VMStaticScrape
metadata:
  name: vps-node-exporter
  namespace: monitoring
spec:
  jobName: vps-node-exporter
  targetEndpoints:
  - targets:
    - 172.16.3.1:9100
    - 172.16.3.2:9100
    - 172.16.3.3:9100
    labels:
      job: node-exporter
      source: vps
    interval: 30s
    path: /metrics
