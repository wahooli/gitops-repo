apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: base-kyverno
  namespace: flux-system
  annotations:
    homelab.wahoo.li/base-helmrelease: kyverno
spec:
  releaseName: base-kyverno
  targetNamespace: kyverno
  chart:
    spec:
      chart: kyverno
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
      interval: 24h
  install:
    timeout: 10m
    remediation:
      retries: -1
  upgrade:
    remediation:
      remediateLastFailure: true
  valuesFrom:
  - kind: ConfigMap
    name: kyverno-values
    valuesKey: values-base.yaml
