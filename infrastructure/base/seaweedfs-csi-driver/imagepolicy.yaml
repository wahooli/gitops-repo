apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: seaweedfs-csi-driver
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: seaweedfs-csi-driver
  filterTags:
    pattern: '^v(?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)$'
    extract: '$major.$minor.$patch'
  policy:
    semver:
      range: '>=1.4.0'
