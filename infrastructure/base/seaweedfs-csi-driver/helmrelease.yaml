apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: base-seaweedfs-csi-driver
  namespace: flux-system
  annotations:
    homelab.wahoo.li/base-helmrelease: seaweedfs-csi-driver
spec:
  interval: 5m
  releaseName: base-seaweedfs-csi-driver
  chart:
    spec:
      chart: seaweedfs-csi-driver
      sourceRef:
        kind: HelmRepository
        name: wahooli
        namespace: flux-system
      version: ">=0.1.0-0"
      interval: 24h
  install:
    remediation:
      retries: -1
  valuesFrom:
  - kind: ConfigMap
    name: seaweedfs-csi-driver-values
    valuesKey: values-base.yaml
