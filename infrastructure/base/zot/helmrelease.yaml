apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: base-zot
  namespace: flux-system
  annotations:
    homelab.wahoo.li/base-helmrelease: zot
spec:
  releaseName: base-zot
  targetNamespace: zot
  chart:
    spec:
      chart: zot
      sourceRef:
        kind: HelmRepository
        name: project-zot
        namespace: flux-system
      version: "0.1.104"
      interval: 24h
  install:
    timeout: 10m
    remediation:
      retries: -1
  valuesFrom:
  - kind: ConfigMap
    name: zot-values
    valuesKey: values-base.yaml
