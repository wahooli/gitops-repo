apiVersion: serving.kserve.io/v1alpha1
kind: ClusterServingRuntime
metadata:
  name: speaches-cuda
spec:
  supportedModelFormats:
  - name: whisper
    autoSelect: false
  containers:
  - name: kserve-container
    image: ghcr.io/wahooli/docker/speaches:latest-cuda
    env:
    - name: WHISPER__INFERENCE_DEVICE
      value: cuda
    # Always-loaded; per-IS we still want this pinned even if a future
    # IS overrides for some reason.
    - name: WHISPER__TTL
      value: "-1"
    - name: HF_HOME
      value: /cache/hf
    ports:
    - containerPort: 8000
      protocol: TCP
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 30
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 60
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 600
      periodSeconds: 60
    volumeMounts:
    - name: hf-cache
      mountPath: /cache/hf
