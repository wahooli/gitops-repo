apiVersion: serving.kserve.io/v1alpha1
kind: ClusterServingRuntime
metadata:
  name: llama-cpp-cpu
spec:
  supportedModelFormats:
  - name: gguf
    autoSelect: false
  containers:
  - name: kserve-container
    image: ghcr.io/ggml-org/llama.cpp:server
    args:
    - --host
    - 0.0.0.0
    - --port
    - "8080"
    - --jinja
    - --parallel
    - "2"
    ports:
    - containerPort: 8080
      protocol: TCP
    readinessProbe:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 90
    livenessProbe:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 300
      periodSeconds: 60
    volumeMounts:
    - name: models
      mountPath: /models
