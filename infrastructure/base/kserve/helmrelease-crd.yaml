apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: base-kserve-crd
  namespace: flux-system
  annotations:
    homelab.wahoo.li/base-helmrelease: kserve-crd
spec:
  releaseName: base-kserve-crd
  targetNamespace: kserve
  chart:
    spec:
      chart: kserve-crd
      sourceRef:
        kind: HelmRepository
        name: kserve
        namespace: flux-system
      version: "v0.17.0"
      interval: 24h
  install:
    timeout: 10m
    remediation:
      retries: -1
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
