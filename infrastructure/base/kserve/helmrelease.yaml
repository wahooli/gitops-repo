apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: base-kserve
  namespace: flux-system
  annotations:
    homelab.wahoo.li/base-helmrelease: kserve
spec:
  releaseName: base-kserve
  targetNamespace: kserve
  dependsOn:
  - name: base-kserve-crd
  chart:
    spec:
      chart: kserve-resources
      sourceRef:
        kind: HelmRepository
        name: kserve
        namespace: flux-system
      version: "v0.17.0"
      interval: 24h
  install:
    timeout: 10m
    remediation:
      retries: -1
  upgrade:
    remediation:
      remediateLastFailure: true
  valuesFrom:
  - kind: ConfigMap
    name: kserve-values
    valuesKey: values-base.yaml
