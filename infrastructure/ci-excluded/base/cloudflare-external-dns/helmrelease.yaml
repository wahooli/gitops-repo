apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudflare-dns--cloudflare-external-dns
  namespace: flux-system
spec:
  interval: 10m
  releaseName: cloudflare-external-dns
  targetNamespace: cloudflare-dns
  chart:
    spec:
      version: "1.15.0"
  valuesFrom:
  - kind: ConfigMap
    name: cloudflare-external-dns-values
    valuesKey: values-base.yaml
  - kind: ConfigMap
    name: cloudflare-external-dns-values
    valuesKey: values.yaml
  - kind: ConfigMap
    name: cloudflare-external-dns-values
    valuesKey: values-extra.yaml
    optional: true
