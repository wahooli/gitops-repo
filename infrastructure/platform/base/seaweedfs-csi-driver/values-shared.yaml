  configmap.reloader.stakater.com/reload: "seaweedfs-csi-driver-shared-config"
nodeGc:
  image:
    repository: ghcr.io/wahooli/docker/kubectl
    tag: 0.0.1 # {"$imagepolicy": "flux-system:kubectl-docker:tag"}
  enabled: true
