apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../../base/seaweedfs-csi-driver
- imagerepository-kubectl.yaml
- imagepolicy-kubectl.yaml
patches:
- path: helmrelease.yaml
  target:
    kind: HelmRelease
  options:
    allowNameChange: true
configMapGenerator:
- name: seaweedfs-csi-driver-values
  namespace: flux-system
  behavior: merge
  files:
  - values-shared.yaml=values-shared.yaml
  options:
    labels:
      velero.io/exclude-from-backup: "true"
configurations:
- ../../../.config/valuesFrom.yaml
