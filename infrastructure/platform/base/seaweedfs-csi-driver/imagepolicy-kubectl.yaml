apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: kubectl-docker
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: kubectl-docker
  filterTags:
    pattern: '^(?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)$'
    extract: '$major.$minor.$patch'
  policy:
    semver:
      range: '>=0.0.1'
