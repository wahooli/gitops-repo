apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: seaweedfs
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: seaweedfs
  filterTags:
    pattern: 'v(?P<major>\d+)\.(?P<minor>\d+)\.?(?P<patch>\d+)?'
    extract: '$major$minor$patch'
  policy:
    numerical:
      order: asc
