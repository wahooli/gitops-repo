apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../../base/haproxy
- namespace.yaml
- imagepolicy.yaml
patches:
- path: helmrelease.yaml
  target:
    kind: HelmRelease
    name: base-haproxy
  options:
    allowNameChange: true
configMapGenerator:
- name: haproxy-values
  namespace: flux-system
  behavior: create
  files:
  - values.yaml=values.yaml
  options:
    labels:
      velero.io/exclude-from-backup: "true"
configurations:
- ../../../.config/valuesFrom.yaml
