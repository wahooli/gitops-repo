apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base/velero
- change-storage-class-config.yaml
patches:
- target:
    kind: HelmRelease
    name: velero--velero
  patch: |-
    apiVersion: helm.toolkit.fluxcd.io/v2
    kind: HelmRelease
    metadata:
      name: velero--velero
    spec:
      upgrade:
        disableHooks: true
