apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: seaweedfs-backup-filer
  namespace: seaweedfs-backup
spec:
  parentRefs:
  - name: envoy-gw-private
    namespace: envoy-gateway-system
  hostnames:
  - "seaweedfs-backup.${domain_wahoo_li:=wahoo.li}"
  - "seaweedfs-backup.${domain_absolutist_it:=absolutist.it}"
  rules:
  - backendRefs:
    - name: seaweedfs-backup-filer
      port: 8888
