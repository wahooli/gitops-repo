apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base/cert-manager-issuers
patches:
- target:
    kind: ClusterIssuer
    name: letsencrypt-production
  patch: |-
    $patch: delete
    apiVersion: cert-manager.io/v1
    kind: ClusterIssuer
    metadata:
      name: letsencrypt-production
- target:
    kind: ClusterIssuer
    name: letsencrypt-staging
  patch: |-
    $patch: delete
    apiVersion: cert-manager.io/v1
    kind: ClusterIssuer
    metadata:
      name: letsencrypt-staging
