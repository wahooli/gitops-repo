apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: logging--vector-agent
  namespace: flux-system
  annotations:
    homelab.wahoo.li/base-helmrelease: vector
spec:
  dependsOn:
  - name: victoria-metrics--victoria-metrics-operator
    namespace: flux-system
  releaseName: vector-agent
  targetNamespace: logging
  interval: 10m
  chart:
    spec:
      chart: vector
      sourceRef:
        kind: HelmRepository
        name: vector
        namespace: flux-system
      interval: 24h
      version: "0.50.0" # {"$imagepolicy": "flux-system:vector-helm-chart:tag"}
  install:
    remediation:
      retries: -1
  valuesFrom:
  - kind: ConfigMap
    name: vector-agent-values
    valuesKey: values-base.yaml
  - kind: ConfigMap
    name: vector-agent-values
    valuesKey: values.yaml
  values:
    existingConfigMaps:
    - vector-agent-config
