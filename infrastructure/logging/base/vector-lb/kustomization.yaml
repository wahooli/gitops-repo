apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../../base/vector/helmrelease.yaml
patches:
- path: helmrelease.yaml
  target:
    kind: HelmRelease
    name: base-vector
  options:
    allowNameChange: true
configurations:
- ../../../.config/valuesFrom.yaml
- kustomizeconfig.yaml
