apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base/vector-lb
- ../../../base/vector/helmrepository.yaml
- ../../../base/vector/imagerepository.yaml
- ../../../base/vector/imagepolicy.yaml
configMapGenerator:
- name: vector-values
  namespace: flux-system
  files:
  - values-base.yaml=../../../base/vector/values-base.yaml
  - values.yaml=values.yaml
  options:
    labels:
      velero.io/exclude-from-backup: "true"
- name: vector-lb-config
  namespace: flux-system
  options:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "logging"
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "logging"
  files:
  - vector.yaml=config.yaml
