apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: alertmanager
  namespace: alerting
  annotations:
    external-dns.alpha.kubernetes.io/target: gw.${domain_absolutist_it:=absolutist.it}
spec:
  parentRefs:
  - name: envoy-gw-private
    namespace: envoy-gateway-system
  hostnames:
  - "alertmanager.${domain_absolutist_it:=absolutist.it}"
  rules:
  - backendRefs:
    - name: vmalertmanager-nas
      port: 9093
