apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vmalert-vlogs
  namespace: alerting
  annotations:
    external-dns.alpha.kubernetes.io/target: gw.${domain_absolutist_it:=absolutist.it}
spec:
  parentRefs:
  - name: envoy-gw-private
    namespace: envoy-gateway-system
  hostnames:
  - "log-alerts.${domain_absolutist_it:=absolutist.it}"
  rules:
  - backendRefs:
    - name: vmalert-vlogs-tpi-1
      port: 8080
