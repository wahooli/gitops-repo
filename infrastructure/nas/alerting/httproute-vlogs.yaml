apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vmalert-vlogs
  namespace: alerting
  annotations:
    external-dns.alpha.kubernetes.io/target: gw.nas.${domain_absolutist_it:=absolutist.it}
spec:
  parentRefs:
  - name: internal-gw
    namespace: infrastructure
  hostnames:
  - "log-alerts.${domain_absolutist_it:=absolutist.it}"
  rules:
  - backendRefs:
    - name: vmalert-vlogs-nas
      port: 8080
