apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../../base/blocky
- imagepolicy.yaml
- certificate.yaml
- cors-policy.yaml
patches:
- path: helmrelease.yaml
  target:
    kind: HelmRelease
  options:
    allowNameChange: true
configMapGenerator:
- name: blocky-config
  namespace: flux-system
  files:
  - config.yml=config/config.yml
  - tlds-alpha-by-domain.txt=config/lists/tlds-alpha-by-domain.txt
  - ads-whitelist.txt=config/lists/ads-whitelist.txt
  - manual-blocklist.txt=config/lists/manual-blocklist.txt
  options:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "internal-dns"
- name: blocky-values
  namespace: flux-system
  behavior: merge
  files:
  - values.yaml=values.yaml
  options:
    labels:
      velero.io/exclude-from-backup: "true"
configurations:
- kustomizeconfig.yaml
