apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tautulli
  namespace: default
spec:
  parentRefs:
  - name: envoy-gw-private
    namespace: envoy-gateway-system
  hostnames:
  - "tautulli.${domain_absolutist_it:=absolutist.it}"
  rules:
  - backendRefs:
    - name: tautulli
      port: 8181
