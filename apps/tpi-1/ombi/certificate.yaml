apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ombi-ingress
  namespace: default
  labels:
    backupWeekly: "true"
    backupDaily: "true"
    app.kubernetes.io/part-of: ombi
spec:
  secretName: tls-ombi-ingress
  secretTemplate:
    labels:
      backupWeekly: "true"
      backupDaily: "true"
      app.kubernetes.io/part-of: ombi
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
  - ombi.${domain_wahoo_li:=wahoo.li}
