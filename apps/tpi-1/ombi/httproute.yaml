apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ombi
  namespace: default
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  parentRefs:
  - name: envoy-gw
    namespace: envoy-gateway-system
  - name: envoy-gw-private
    namespace: envoy-gateway-system
    sectionName: wahooli-https
  hostnames:
  - "ombi.${domain_wahoo_li:=wahoo.li}"
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: ak-outpost-proxy-default
      port: 9000
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /outpost.goauthentik.io
  # Root + API — no cache
  - backendRefs:
    - group: ""
      kind: Service
      name: ombi
      port: 3579
      weight: 1
    filters:
    - type: ResponseHeaderModifier
      responseHeaderModifier:
        set:
        - name: Cache-Control
          value: "no-cache, no-store, must-revalidate"
        - name: Pragma
          value: "no-cache"
    matches:
    - path:
        type: Exact
        value: /
    - path:
        type: PathPrefix
        value: /api
  # Static assets — explicitly cached
  - backendRefs:
    - group: ""
      kind: Service
      name: ombi
      port: 3579
      weight: 1
    filters:
    - type: ResponseHeaderModifier
      responseHeaderModifier:
        set:
        - name: Cache-Control
          value: "public, max-age=86400"
    matches:
    - path:
        type: PathPrefix
        value: /images
    - path:
        type: PathPrefix
        value: /translations
    - path:
        type: PathPrefix
        value: /dist
    - path:
        type: PathPrefix
        value: /assets
  # Everything else — default
  - backendRefs:
    - group: ""
      kind: Service
      name: ombi
      port: 3579
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: ombi-auth
  namespace: default
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: ombi
  extAuth:
    failOpen: false
    headersToExtAuth:
    - cookie
    - authorization
    - proxy-authorization
    - x-forwarded-for
    - x-forwarded-proto
    - x-real-ip
    - accept
    http:
      backendRefs:
      - name: ak-outpost-proxy-default
        namespace: default
        port: 9000
      path: /outpost.goauthentik.io/auth/envoy
      headersToBackend:
      - set-cookie
      - x-authentik-username
      - x-authentik-uid
      - x-authentik-name
      - x-authentik-email
      - x-authentik-groups
      - x-authentik-entitlements
      - x-authentik-jwt
