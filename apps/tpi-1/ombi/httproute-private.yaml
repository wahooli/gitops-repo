apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ombi-private
  namespace: default
spec:
  parentRefs:
  - name: envoy-gw-private
    namespace: envoy-gateway-system
  hostnames:
  - "ombi.${domain_absolutist_it:=absolutist.it}"
  rules:
  # Root + API — no cache
  - backendRefs:
    - group: ""
      kind: Service
      name: ombi
      port: 3579
      weight: 1
    filters:
    - type: ResponseHeaderModifier
      responseHeaderModifier:
        set:
        - name: Cache-Control
          value: "no-cache, no-store, must-revalidate"
        - name: Pragma
          value: "no-cache"
    matches:
    - path:
        type: Exact
        value: /
    - path:
        type: PathPrefix
        value: /api
  # Images & translations — explicitly cached
  - backendRefs:
    - group: ""
      kind: Service
      name: ombi
      port: 3579
      weight: 1
    filters:
    - type: ResponseHeaderModifier
      responseHeaderModifier:
        set:
        - name: Cache-Control
          value: "public, max-age=86400"
    matches:
    - path:
        type: PathPrefix
        value: /images
    - path:
        type: PathPrefix
        value: /translations
  # Everything else — default
  - backendRefs:
    - group: ""
      kind: Service
      name: ombi
      port: 3579
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /
