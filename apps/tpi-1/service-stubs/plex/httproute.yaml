apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: plex
  namespace: default
spec:
  parentRefs:
  - name: envoy-gw
    namespace: envoy-gateway-system
  - name: envoy-gw-private
    namespace: envoy-gateway-system
  hostnames:
  - "plex.${domain_absolutist_it:=absolutist.it}"
  - "plex.${domain_wahoo_li:=wahoo.li}"
  rules:
  - backendRefs:
    - name: plex
      port: 32400
