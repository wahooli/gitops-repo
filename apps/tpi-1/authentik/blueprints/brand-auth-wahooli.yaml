# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
metadata:
  name: Init - Brand
version: 1
entries:
- model: authentik_blueprints.metaapplyblueprint
  attrs:
    identifiers:
      name: Init - Authentication flow
    required: false
- model: authentik_blueprints.metaapplyblueprint
  attrs:
    identifiers:
      name: Init - Recovery with email verification
    required: false
- model: authentik_blueprints.metaapplyblueprint
  attrs:
    identifiers:
      name: Default - Invalidation flow
    required: false
- model: authentik_blueprints.metaapplyblueprint
  attrs:
    identifiers:
      name: Init - User settings flow
    required: false
- model: authentik_brands.brand
  state: present
  identifiers:
    domain: authentik-default
  attrs:
    default: false
- model: authentik_brands.brand
  state: present
  identifiers:
    domain: auth-wahooli
  attrs:
    default: true
    flow_authentication:
      !Find [authentik_flows.flow, [slug, login]]
    flow_invalidation:
      !Find [authentik_flows.flow, [slug, default-invalidation-flow]]
    flow_user_settings:
      !Find [authentik_flows.flow, [slug, default-user-settings-flow]]
    flow_recovery:
      !Find [authentik_flows.flow, [slug, password-reset]]
    branding_title: auth.${domain_wahoo_li:=wahoo.li}
    branding_favicon: /static/dist/assets/icons/icon.png
    branding_logo: /static/dist/assets/icons/icon_left_brand.svg
