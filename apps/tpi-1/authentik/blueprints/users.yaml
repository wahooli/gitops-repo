# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
version: 1
metadata:
  name: Init - Users
  labels:
    blueprints.goauthentik.io/system: "true"
entries:
- model: authentik_blueprints.metaapplyblueprint
  attrs:
    identifiers:
      name: Init - Groups
    required: false
- model: authentik_core.group
  state: created
  identifiers:
    name: Jellyfin Users
  id: ref-group-jellyfin-users
- model: authentik_core.user
  identifiers:
    username: jellyfin-ldap-bind-user
  state: present
  attrs:
    attributes:
      disable-normal-login: true
    groups:
    - !KeyOf ref-group-jellyfin-users
    is_active: true
    path: users
    type: service_account
    name: Jellyfin LDAP Bind user
    username: jellyfin-ldap-bind-user
    password: ${authentik_jellyfin_bind_user_password}
  id: jellyfin-ldap-bind-user
