# envFrom:
#   envs:
#     type: configMap
#     useFromChart: false
#     name: overseerr-env

env:
  LOG_LEVEL: warn
  TZ: Europe/Helsinki
dnsConfig:
  options:
  - name: ndots
    value: "1"
  - name: edns0
image:
  repository: ghcr.io/lenaxia/overseerr-oidc
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "oidc-support"

podAnnotations:
  backup.velero.io/backup-volumes: config
global:
  labels:
    backupWeekly: "true"
    backupDaily: "true"
    app.kubernetes.io/part-of: overseerr

# resources:
#   requests:
#     memory: "256Mi"
#     cpu: "400m"
#   limits:
#     memory: "3072Mi"
#     cpu: "1000m"
persistence:
  config:
    enabled: true
    mount:
    - path: /app/config
    spec:
      isPersistentVolumeClaim: true
      accessModes:
      - "ReadWriteOnce"
      resources:
        requests:
          storage: "2Gi"

service:
  main:
    annotations:
      service.cilium.io/global: "true"
      service.cilium.io/affinity: "local"
      service.cilium.io/global-sync-endpoint-slices: "true"
ingress:
  main:
    enabled: false
