apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: overseerr
  namespace: default
spec:
  parentRefs:
  - name: internal-gw
    namespace: infrastructure
  hostnames:
  - "overseerr.${domain_absolutist_it:=absolutist.it}"
  - "overseerr.${domain_wahoo_li:=wahoo.li}"
  rules:
  - backendRefs:
    - name: overseerr
      port: 5055
