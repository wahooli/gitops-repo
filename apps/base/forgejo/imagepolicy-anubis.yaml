apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: anubis
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: anubis
  filterTags:
    pattern: '^v(?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)$'
    extract: '$major.$minor.$patch'
  policy:
    semver:
      range: '>=0.1.0'
