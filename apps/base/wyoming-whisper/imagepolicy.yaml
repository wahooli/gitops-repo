apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: wyoming-whisper
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: wyoming-whisper
  filterTags:
    pattern: '^(?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)$'
    extract: '$major.$minor.$patch'
  policy:
    semver:
      range: '>=3.0.0'
