apiVersion: apps/v1
kind: Deployment
metadata:
  name: wyoming-whisper
  namespace: homeassistant-assist
  labels:
    app.kubernetes.io/name: wyoming-whisper
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: wyoming-whisper
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wyoming-whisper
    spec:
      containers:
      - name: wyoming-whisper
        image: rhasspy/wyoming-whisper:3.1.0
        imagePullPolicy: IfNotPresent
        args:
        - --model
        - base.en
        - --language
        - en
        - --compute-type
        - int8
        - --uri
        - tcp://0.0.0.0:10300
        - --data-dir
        - /data
        - --download-dir
        - /data
        ports:
        - containerPort: 10300
          name: wyoming
          protocol: TCP
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 2560Mi
        readinessProbe:
          tcpSocket:
            port: wyoming
          initialDelaySeconds: 20
          periodSeconds: 10
          failureThreshold: 30
        livenessProbe:
          tcpSocket:
            port: wyoming
          initialDelaySeconds: 120
          periodSeconds: 30
          failureThreshold: 3
        volumeMounts:
        - name: models
          mountPath: /data
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: wyoming-whisper-models
