apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-agent
  namespace: hermes-agent
  labels:
    app.kubernetes.io/name: hermes-agent
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes-agent
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
      containers:
      - name: hermes-agent
        image: docker.io/nousresearch/hermes-agent:v2026.4.30
        imagePullPolicy: IfNotPresent
        # Leave ENTRYPOINT alone (tini → entrypoint.sh activates the venv
        # that puts `hermes` on PATH); only override CMD via args.
        args: ["gateway", "run"]
        env:
        - name: HERMES_HOME
          value: /opt/data
        - name: API_SERVER_HOST
          value: 0.0.0.0
        - name: API_SERVER_PORT
          value: "8642"
        # Auth is enforced upstream by API_SERVER_KEY (and, when external
        # exposure is enabled, by Envoy apiKeyAuth too). Disable Hermes'
        # platform-level user allowlist so /v1 traffic isn't double-gated.
        - name: GATEWAY_ALLOW_ALL_USERS
          value: "true"
        envFrom:
        - secretRef:
            name: hermes-agent-secrets
        ports:
        - containerPort: 8642
          name: api
          protocol: TCP
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: "2"
            memory: 2Gi
        readinessProbe:
          tcpSocket:
            port: api
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 20
        livenessProbe:
          tcpSocket:
            port: api
          initialDelaySeconds: 120
          periodSeconds: 60
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /opt/data
        - name: config
          mountPath: /opt/data/config.yaml
          subPath: config.yaml
          readOnly: true
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: hermes-agent-data
      - name: config
        configMap:
          name: hermes-agent-config
