apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- namespace.yaml
- helmrepository.yaml
- helmrelease.yaml
configMapGenerator:
- name: open-webui-values
  namespace: flux-system
  files:
  - values-base.yaml=values-base.yaml
  options:
    labels:
      velero.io/exclude-from-backup: "true"
configurations:
- ../../.config/valuesFrom.yaml
