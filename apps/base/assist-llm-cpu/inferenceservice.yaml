apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: base-assist-llm-cpu
  namespace: homeassistant-assist
  labels:
    networking.knative.dev/visibility: cluster-local
spec:
  predictor:
    minReplicas: 1
    maxReplicas: 1
    scaleTarget: 1
    scaleMetric: concurrency
    timeout: 9000
    initContainers:
    - name: model-pull
      image: ollama/ollama:0.21.2
      command:
      - sh
      - -c
      - |
        set -e
        ollama serve >/tmp/serve.log 2>&1 &
        SRV=$!
        until ollama list >/dev/null 2>&1; do sleep 1; done
        ollama pull gemma4:e2b
        ollama cp gemma4:e2b assist-llm
        kill $SRV
        wait $SRV 2>/dev/null || true
      env:
      - name: OLLAMA_HOST
        value: 127.0.0.1:11434
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: "2"
          memory: 2Gi
    containers:
    - name: ollama
      image: ollama/ollama:0.21.2
      ports:
      - containerPort: 11434
        protocol: TCP
      env:
      - name: OLLAMA_HOST
        value: 0.0.0.0:11434
      - name: OLLAMA_KEEP_ALIVE
        value: "-1"
      - name: OLLAMA_CONTEXT_LENGTH
        value: "8192"
      lifecycle:
        postStart:
          exec:
            command:
            - sh
            - -c
            - |
              until ollama list >/dev/null 2>&1; do sleep 1; done
              ollama run assist-llm 'hi' </dev/null >/dev/null 2>&1 || true
      readinessProbe:
        exec:
          command:
          - sh
          - -c
          - 'ollama ps 2>/dev/null | grep -q assist-llm'
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 60
      livenessProbe:
        tcpSocket:
          port: 11434
        initialDelaySeconds: 300
        periodSeconds: 60
      resources:
        requests:
          cpu: "1"
          memory: 2Gi
        limits:
          cpu: "4"
          memory: 4Gi
