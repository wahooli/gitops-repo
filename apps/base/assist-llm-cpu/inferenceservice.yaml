apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: base-assist-llm-cpu
  namespace: homeassistant-assist
  labels:
    networking.knative.dev/visibility: cluster-local
spec:
  predictor:
    minReplicas: 1
    maxReplicas: 1
    scaleTarget: 1
    scaleMetric: concurrency
    timeout: 9000
    initContainers:
    - name: model-pull
      image: curlimages/curl:8.11.1
      securityContext:
        runAsUser: 0
      command:
      - sh
      - -c
      - |
        set -e
        if [ -f "$MODEL_PATH" ]; then
          echo "model cached: $MODEL_PATH"
          exit 0
        fi
        echo "downloading $MODEL_URL"
        rm -f "$MODEL_PATH.partial"
        curl -fL --retry 5 --retry-delay 5 -o "$MODEL_PATH.partial" "$MODEL_URL"
        mv "$MODEL_PATH.partial" "$MODEL_PATH"
      env:
      - name: MODEL_URL
        value: https://huggingface.co/bartowski/Qwen3-0.6B-GGUF/resolve/main/Qwen3-0.6B-Q4_K_M.gguf
      - name: MODEL_PATH
        value: /models/Qwen3-0.6B-Q4_K_M.gguf
      resources:
        requests:
          cpu: 100m
          memory: 64Mi
        limits:
          cpu: "1"
          memory: 256Mi
      volumeMounts:
      - name: models
        mountPath: /models
    model:
      modelFormat:
        name: gguf
      runtime: llama-cpp-cpu
      args:
      - -m
      - /models/Qwen3-0.6B-Q4_K_M.gguf
      - -c
      - "2048"
      resources:
        requests:
          cpu: 1
          memory: 1Gi
        limits:
          cpu: 6
          memory: 3Gi
