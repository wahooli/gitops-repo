apiVersion: v1
kind: Service
metadata:
  # Named to match the old KServe-auto-generated whisper-asr Service so
  # Bazarr's existing endpoint URL keeps working without reconfig.
  name: whisper-asr-predictor
  namespace: default
  labels:
    app.kubernetes.io/name: whisper-asr-shim
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 9000
    targetPort: http
    protocol: TCP
  selector:
    app.kubernetes.io/name: whisper-asr-shim
