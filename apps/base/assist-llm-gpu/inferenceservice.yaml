apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: base-assist-llm-gpu
  namespace: homeassistant-assist
  labels:
    networking.knative.dev/visibility: cluster-local
  annotations:
    autoscaling.knative.dev/scale-down-delay: "10m"
    autoscaling.knative.dev/window: "60s"
spec:
  predictor:
    minReplicas: 0
    maxReplicas: 1
    scaleTarget: 1
    scaleMetric: concurrency
    timeout: 9000
    runtimeClassName: nvidia
    initContainers:
    - name: model-pull
      image: ollama/ollama:0.21.2
      command:
      - sh
      - -c
      - |
        set -e
        ollama serve >/tmp/serve.log 2>&1 &
        SRV=$!
        until ollama list >/dev/null 2>&1; do sleep 1; done
        ollama pull qwen3:1.7b
        cat > /tmp/Modelfile <<'EOF'
        FROM qwen3:1.7b
        SYSTEM "/no_think"
        EOF
        ollama create assist-llm -f /tmp/Modelfile
        kill $SRV
        wait $SRV 2>/dev/null || true
      env:
      - name: OLLAMA_HOST
        value: 127.0.0.1:11434
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: "2"
          memory: 2Gi
    containers:
    - name: ollama
      image: ollama/ollama:0.21.2
      command:
      - sh
      - -c
      - |
        set -e
        ollama serve &
        SRV=$!
        trap 'kill -TERM "$SRV" 2>/dev/null; wait "$SRV"' TERM INT
        until ollama list >/dev/null 2>&1; do sleep 1; done
        if ollama run assist-llm 'hi' </dev/null >/dev/null 2>&1; then
          touch /tmp/ready
        fi
        wait "$SRV"
      ports:
      - containerPort: 11434
        protocol: TCP
      env:
      - name: OLLAMA_HOST
        value: 0.0.0.0:11434
      - name: OLLAMA_KEEP_ALIVE
        value: "-1"
      - name: OLLAMA_CONTEXT_LENGTH
        value: "8192"
      readinessProbe:
        exec:
          command:
          - test
          - -f
          - /tmp/ready
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 2
        failureThreshold: 90
      livenessProbe:
        tcpSocket:
          port: 11434
        initialDelaySeconds: 300
        periodSeconds: 60
      resources:
        requests:
          cpu: 500m
          memory: 2Gi
        limits:
          cpu: "2"
          memory: 3Gi
