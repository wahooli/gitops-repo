apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: base-assist-llm-gpu
  namespace: homeassistant-assist
  labels:
    networking.knative.dev/visibility: cluster-local
  annotations:
    autoscaling.knative.dev/scale-down-delay: "10m"
    autoscaling.knative.dev/window: "60s"
spec:
  predictor:
    minReplicas: 1
    maxReplicas: 1
    scaleTarget: 1
    scaleMetric: concurrency
    timeout: 9000
    runtimeClassName: nvidia
    model:
      modelFormat:
        name: vllm
      runtime: vllm-cuda
      args:
      - --model
      - cosmicproc/Qwen3.5-4B-NVFP4
      - --max-model-len
      - "102400"
      - --gpu-memory-utilization
      - "0.4"
      resources:
        requests:
          cpu: 500m
          memory: 4Gi
        limits:
          cpu: "4"
          memory: 8Gi
