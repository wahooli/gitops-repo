apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: assist-llm-gpu
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: assist-llm-gpu
  filterTags:
    pattern: '^(?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)$'
    extract: '$major.$minor.$patch'
  policy:
    semver:
      range: '>=0.21.0'
