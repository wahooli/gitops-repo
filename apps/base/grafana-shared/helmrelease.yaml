apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana--grafana
  namespace: flux-system
spec:
  releaseName: grafana
  interval: 5m
  targetNamespace: grafana
  chart:
    spec:
      version: "10.5.15"
  valuesFrom:
  - kind: ConfigMap
    name: grafana-values
    valuesKey: values.yaml
