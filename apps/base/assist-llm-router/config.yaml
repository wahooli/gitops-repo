model_list:
- model_name: assist-llm
  litellm_params:
    model: openai/qwen3:4b
    api_base: http://assist-llm-gpu-predictor.homeassistant-assist.svc.cluster.local/v1
    api_key: "ollama-no-auth"
    timeout: 30
- model_name: assist-llm-cpu-fallback
  litellm_params:
    model: openai/qwen3:1.7b
    api_base: http://assist-llm-cpu-predictor.homeassistant-assist.svc.cluster.local/v1
    api_key: "ollama-no-auth"
    timeout: 60
litellm_settings:
  fallbacks:
  - assist-llm: ["assist-llm-cpu-fallback"]
  drop_params: true
general_settings:
  disable_spend_logs: true
