apiVersion: apps/v1
kind: Deployment
metadata:
  name: assist-llm-router
  namespace: homeassistant-assist
  labels:
    app.kubernetes.io/name: assist-llm-router
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: assist-llm-router
  template:
    metadata:
      labels:
        app.kubernetes.io/name: assist-llm-router
    spec:
      containers:
      - name: nginx
        image: nginx:1.30.0-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4000
          name: http
          protocol: TCP
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 500m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 2
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/conf.d
      volumes:
      - name: config
        configMap:
          name: assist-llm-router-config
