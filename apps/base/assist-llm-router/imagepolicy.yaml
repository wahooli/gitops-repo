apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: assist-llm-router
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: assist-llm-router
  filterTags:
    pattern: '^(?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)-alpine$'
    extract: '$major.$minor.$patch'
  policy:
    semver:
      range: '>=1.27.0'
