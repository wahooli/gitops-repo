# Use cluster DNS with short cache so re-resolves catch service deletions/recreations
resolver kube-dns.kube-system.svc.cluster.local valid=5s ipv6=off;

server {
    listen 4000;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    location / {
        # Variable in proxy_pass forces per-request DNS resolution
        set $gpu_upstream "assist-llm-gpu-predictor.homeassistant-assist.svc.cluster.local";
        proxy_pass http://$gpu_upstream;
        proxy_set_header Host $gpu_upstream;
        proxy_http_version 1.1;

        proxy_intercept_errors on;
        # GPU returns these → fall over to CPU
        error_page 404 408 500 502 503 504 = @cpu_fallback;

        # cold GPU load can be ~25s; large prompts up to ~60s
        proxy_connect_timeout 2s;
        proxy_send_timeout 30s;
        proxy_read_timeout 120s;

        proxy_buffering off;
        # request_buffering MUST be on so error_page fallback can replay the body
    }

    location @cpu_fallback {
        set $cpu_upstream "assist-llm-cpu-predictor.homeassistant-assist.svc.cluster.local";
        proxy_pass http://$cpu_upstream;
        proxy_set_header Host $cpu_upstream;
        proxy_http_version 1.1;

        proxy_connect_timeout 2s;
        proxy_send_timeout 30s;
        proxy_read_timeout 120s;

        proxy_buffering off;
        # request_buffering MUST be on so error_page fallback can replay the body
    }
}
