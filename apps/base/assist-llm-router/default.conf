server {
    listen 4000;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    location / {
        proxy_pass http://assist-llm-gpu-predictor.homeassistant-assist.svc.cluster.local;
        proxy_set_header Host assist-llm-gpu-predictor.homeassistant-assist.svc.cluster.local;
        proxy_http_version 1.1;

        proxy_intercept_errors on;
        # any of these from GPU → fall over to CPU
        error_page 404 408 500 502 503 504 = @cpu_fallback;

        # cold GPU load can be ~25s; large prompts up to ~60s
        proxy_connect_timeout 2s;
        proxy_send_timeout 30s;
        proxy_read_timeout 120s;

        proxy_buffering off;
        proxy_request_buffering off;
    }

    location @cpu_fallback {
        proxy_pass http://assist-llm-cpu-predictor.homeassistant-assist.svc.cluster.local;
        proxy_set_header Host assist-llm-cpu-predictor.homeassistant-assist.svc.cluster.local;
        proxy_http_version 1.1;

        proxy_connect_timeout 2s;
        proxy_send_timeout 30s;
        proxy_read_timeout 120s;

        proxy_buffering off;
        proxy_request_buffering off;
    }
}
