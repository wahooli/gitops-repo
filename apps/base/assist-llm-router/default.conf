upstream assist_llm {
    server assist-llm-gpu-predictor.homeassistant-assist.svc.cluster.local:80 max_fails=0;
    server assist-llm-cpu-predictor.homeassistant-assist.svc.cluster.local:80 backup max_fails=0;
}

server {
    listen 4000;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    location / {
        proxy_pass http://assist_llm;
        proxy_http_version 1.1;

        # per-request failover; disable down-marking
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;

        # cold GPU load ~25s; CPU warm ~7-10s; large prompts on GPU up to ~60s
        proxy_connect_timeout 2s;
        proxy_send_timeout 30s;
        proxy_read_timeout 120s;

        # streaming pass-through
        proxy_buffering off;
        proxy_request_buffering off;
    }
}
