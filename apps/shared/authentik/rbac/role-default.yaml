apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: authentik-outpost
  namespace: default
  labels:
    app.kubernetes.io/name: authentik-remote-cluster
    app.kubernetes.io/part-of: authentik
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  - services
  - configmaps
  verbs:
  - get
  - create
  - delete
  - list
  - patch
- apiGroups:
  - extensions
  - apps
  resources:
  - deployments
  verbs:
  - get
  - create
  - delete
  - list
  - patch
- apiGroups:
  - extensions
  - networking.k8s.io
  resources:
  - ingresses
  verbs:
  - get
  - create
  - delete
  - list
  - patch
- apiGroups:
  - traefik.containo.us
  - traefik.io
  resources:
  - middlewares
  verbs:
  - get
  - create
  - delete
  - list
  - patch
- apiGroups:
  - monitoring.coreos.com
  resources:
  - servicemonitors
  verbs:
  - get
  - create
  - delete
  - list
  - patch
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - list
