# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
version: 1
metadata:
  name: Init - Outposts
entries:
- model: authentik_blueprints.metaapplyblueprint
  attrs:
    identifiers:
      name: Init - Applications
    required: false
# Reference entries for flows
- model: authentik_flows.flow
  state: created
  identifiers:
    slug: default-provider-authorization-implicit-consent
  id: ref-flow-authorization
  attrs:
    name: Authorize Application
    title: Redirecting to %(app)s
    designation: authorization
- model: authentik_flows.flow
  state: created
  identifiers:
    slug: default-invalidation-flow
  id: ref-flow-invalidation
  attrs:
    name: Logout
    title: Logout
    designation: invalidation
- model: authentik_flows.flow
  state: created
  identifiers:
    slug: ldap-login
  id: ref-flow-ldap-login
  attrs:
    name: LDAP Login
    title: LDAP Login
    designation: authentication
# Reference entries for providers (created by applications blueprint)
- model: authentik_providers_proxy.proxyprovider
  state: created
  identifiers:
    name: ombi-proxy
  id: ref-ombi-proxy
  attrs:
    authorization_flow: !KeyOf ref-flow-authorization
    invalidation_flow: !KeyOf ref-flow-invalidation
    external_host: https://ombi.${domain_wahoo_li:=wahoo.li}
    mode: forward_single
    name: ombi-proxy
- model: authentik_providers_proxy.proxyprovider
  state: created
  identifiers:
    name: sonarr-proxy
  id: ref-sonarr-proxy
  attrs:
    authorization_flow: !KeyOf ref-flow-authorization
    invalidation_flow: !KeyOf ref-flow-invalidation
    external_host: https://sonarr.${domain_wahoo_li:=wahoo.li}
    mode: forward_single
    name: sonarr-proxy
- model: authentik_providers_proxy.proxyprovider
  state: created
  identifiers:
    name: radarr-proxy
  id: ref-radarr-proxy
  attrs:
    authorization_flow: !KeyOf ref-flow-authorization
    invalidation_flow: !KeyOf ref-flow-invalidation
    external_host: https://radarr.${domain_wahoo_li:=wahoo.li}
    mode: forward_single
    name: radarr-proxy
- model: authentik_providers_proxy.proxyprovider
  state: created
  identifiers:
    name: bazarr-proxy
  id: ref-bazarr-proxy
  attrs:
    authorization_flow: !KeyOf ref-flow-authorization
    invalidation_flow: !KeyOf ref-flow-invalidation
    external_host: https://bazarr.${domain_wahoo_li:=wahoo.li}
    mode: forward_single
    name: bazarr-proxy
- model: authentik_providers_proxy.proxyprovider
  state: created
  identifiers:
    name: tautulli-proxy
  id: ref-tautulli-proxy
  attrs:
    authorization_flow: !KeyOf ref-flow-authorization
    invalidation_flow: !KeyOf ref-flow-invalidation
    external_host: https://tautulli.${domain_wahoo_li:=wahoo.li}
    internal_host: http://tautulli:8181
    mode: proxy
    name: tautulli-proxy
- model: authentik_providers_ldap.ldapprovider
  state: created
  identifiers:
    name: jellyfin-ldap-provider
  id: ref-jellyfin-ldap
  attrs:
    authorization_flow: !KeyOf ref-flow-ldap-login
    invalidation_flow: !KeyOf ref-flow-invalidation
    name: jellyfin-ldap-provider

- model: authentik_outposts.kubernetesserviceconnection
  identifiers:
    name: Kubernetes TPi-1
  id: ref-kube-tpi1
  state: created
  attrs:
    name: Kubernetes TPi-1

- model: authentik_outposts.kubernetesserviceconnection
  identifiers:
    name: Kubernetes NAS
  id: ref-kube-nas
  state: created
  attrs:
    name: Kubernetes NAS

- model: authentik_outposts.outpost
  identifiers:
    name: Proxy default
  state: present
  attrs:
    config:
      log_level: info
      docker_labels: null
      authentik_host: http://authentik-server.authentik.svc.cluster.local.:80
      docker_network: null
      container_image: null
      docker_map_ports: true
      refresh_interval: minutes=5
      kubernetes_replicas: 1
      kubernetes_namespace: default
      authentik_host_browser: https://auth.${domain_wahoo_li:=wahoo.li}/
      object_naming_template: ak-outpost-%(name)s
      authentik_host_insecure: true
      kubernetes_json_patches:
        secret:
        - op: add
          path: /metadata/labels/velero.io~1exclude-from-backup
          value: "true"
        service:
        - op: add
          path: /metadata/annotations
          value:
            service.cilium.io/global: "true"
        - op: add
          path: /metadata/labels/scrape-job-name
          value: authentik
        - op: add
          path: /metadata/labels/goauthentik.io~1scrape-metrics
          value: "true"
        - op: add
          path: /metadata/labels/velero.io~1exclude-from-backup
          value: "true"
        deployment:
        - op: add
          path: /metadata/labels/velero.io~1exclude-from-backup
          value: "true"
        - op: add
          path: /spec/template/spec/dnsConfig
          value: {}
        - op: add
          path: /spec/template/spec/dnsConfig/options
          value:
          - name: ndots
            value: "1"
        - op: add
          path: /spec/template/spec/dnsPolicy
          value: ClusterFirstWithHostNet
      kubernetes_service_type: ClusterIP
      kubernetes_image_pull_secrets: []
      kubernetes_ingress_class_name: null
      kubernetes_disabled_components:
      - ingress
      - prometheus servicemonitor
      - traefik middleware
      kubernetes_ingress_annotations: {}
      kubernetes_ingress_secret_name: authentik-outpost-tls
    name: Proxy default
    providers:
    - !KeyOf ref-ombi-proxy
    - !KeyOf ref-sonarr-proxy
    - !KeyOf ref-radarr-proxy
    - !KeyOf ref-bazarr-proxy
    - !KeyOf ref-tautulli-proxy
    service_connection: !KeyOf ref-kube-tpi1
    type: proxy

