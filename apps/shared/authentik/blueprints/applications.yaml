# Custom scope mappings for Forgejo
- model: authentik_providers_oauth2.scopemapping
  state: present
  identifiers:
    name: SSH Public keys
  id: ref-scope-ssh-keys
  attrs:
    scope_name: ssh_keys
    expression: |
      keys = request.user.attributes.get('pubkey', "")
      if isinstance(keys, str):
          return {"ssh_public_keys": [k for k in keys.strip().splitlines() if k.strip()]}
      elif isinstance(keys, list):
          return {"ssh_public_keys": keys}
      return {"ssh_public_keys": []}

- model: authentik_providers_oauth2.scopemapping
  state: present
  identifiers:
    name: "authentik forgejo OAuth Mapping: OpenID 'gitea'"
  id: ref-scope-gitea
  attrs:
    scope_name: gitea
    expression: |
      gitea_claims = {}
      if request.user.ak_groups.filter(name="Gitti User").exists():
          gitea_claims["gitea"]= "user"
      if request.user.ak_groups.filter(name="Gitti Admin").exists():
          gitea_claims["gitea"]= "admin"
      if request.user.ak_groups.filter(name="Gitti Restricted").exists():
          gitea_claims["gitea"]= "restricted"
      return gitea_claims

