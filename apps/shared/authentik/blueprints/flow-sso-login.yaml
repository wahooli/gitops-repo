# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
version: 1
metadata:
  name: Init - SSO Authentication flow
entries:
- model: authentik_blueprints.metaapplyblueprint
  attrs:
    identifiers:
      name: Init - Shared policies
    required: false
- model: authentik_stages_authenticator_validate.authenticatorvalidatestage
  state: created
  identifiers:
    name: login-mfa-validation
  id: ref-mfa-validation
- model: authentik_policies_expression.expressionpolicy
  state: created
  identifiers:
    name: default-source-authentication-if-sso
  id: ref-if-sso
  attrs:
    expression: "return True"
- model: authentik_policies_expression.expressionpolicy
  state: created
  identifiers:
    name: check-ip-in-private-net
  id: ref-check-ip
  attrs:
    expression: "return True"
- attrs:
    designation: authentication
    name: Welcome to auth.${domain_wahoo_li:=wahoo.li}
    title: SSO Login
    authentication: require_unauthenticated
  identifiers:
    slug: sso-login
  model: authentik_flows.flow
  id: flow
- identifiers:
    name: default-source-authentication-login
  id: default-source-authentication-login
  model: authentik_stages_user_login.userloginstage
- identifiers:
    order: 10
    stage: !KeyOf ref-mfa-validation
    target: !KeyOf flow
  id: login-mfa-validation
  model: authentik_flows.flowstagebinding
- identifiers:
    order: 20
    stage: !KeyOf default-source-authentication-login
    target: !KeyOf flow
  model: authentik_flows.flowstagebinding
- identifiers:
    order: 0
    policy: !KeyOf ref-if-sso
    target: !KeyOf flow
  model: authentik_policies.policybinding
- model: authentik_policies.policybinding
  attrs:
    negate: true
    enabled: true
    timeout: 30
  identifiers:
    order: 10
    target: !KeyOf login-mfa-validation
    policy: !KeyOf ref-check-ip
