# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
version: 1
metadata:
  name: Init - LDAP Authentication flow
entries:
- model: authentik_blueprints.metaapplyblueprint
  attrs:
    identifiers:
      name: Init - Authentication flow
    required: false
- model: authentik_stages_identification.identificationstage
  state: created
  identifiers:
    name: login-identification
  id: ref-login-identification
  attrs:
    user_fields:
    - username
- model: authentik_stages_password.passwordstage
  state: created
  identifiers:
    name: login-password
  id: ref-login-password
  attrs:
    backends:
    - authentik.core.auth.InbuiltBackend
- model: authentik_stages_user_login.userloginstage
  state: created
  identifiers:
    name: login-user-login
  id: ref-login-user-login
- attrs:
    authentication: require_outpost
    designation: authentication
    name: Welcome to auth.${domain_wahoo_li:=wahoo.li}
    title: LDAP login
  identifiers:
    slug: ldap-login
  model: authentik_flows.flow
  id: flow
- identifiers:
    order: 10
    stage: !KeyOf ref-login-identification
    target: !KeyOf flow
  model: authentik_flows.flowstagebinding
- identifiers:
    order: 20
    stage: !KeyOf ref-login-password
    target: !KeyOf flow
  attrs:
    re_evaluate_policies: true
    policy_engine_mode: all
  id: ldap-login-flow-password-binding
  model: authentik_flows.flowstagebinding
- identifiers:
    order: 100
    stage: !KeyOf ref-login-user-login
    target: !KeyOf flow
  model: authentik_flows.flowstagebinding
