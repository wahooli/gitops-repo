bots:
- name: deny-ai-crawlers
  action: DENY
  user_agent_regex: "Amazonbot|ChatGPT|GPTBot|ClaudeBot|Bytespider|CCBot"

- name: challenge-bots
  action: CHALLENGE
  user_agent_regex: "[Bb]ot"

- name: git-clients
  action: ALLOW
  user_agent_regex: "^git/"

- name: api-calls
  path_regex: "^/api/"
  action: ALLOW

- name: oauth-callback
  path_regex: "^/user/oauth2/"
  action: ALLOW

- name: well-known
  path_regex: "^/\\.well-known/"
  action: ALLOW

- name: rss-feeds
  path_regex: "\\.(rss|atom)$"
  action: ALLOW

- name: robots-txt
  path_regex: "^/robots.txt$"
  action: ALLOW

- name: default-challenge
  action: CHALLENGE
  user_agent_regex: "."
