apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: forgejo-private
  namespace: forgejo
spec:
  parentRefs:
  - name: envoy-gw-private
    namespace: envoy-gateway-system
  hostnames:
  - "git.${domain_wahoo_li:=wahoo.li}"
  rules:
  # Root — no cache
  - backendRefs:
    - name: forgejo-http
      port: 3000
    filters:
    - type: ResponseHeaderModifier
      responseHeaderModifier:
        set:
        - name: Cache-Control
          value: "no-cache, no-store, must-revalidate"
        - name: Pragma
          value: "no-cache"
    matches:
    - path:
        type: Exact
        value: /
  # Static assets — cached 30 days
  - backendRefs:
    - name: forgejo-http
      port: 3000
    filters:
    - type: ResponseHeaderModifier
      responseHeaderModifier:
        set:
        - name: Cache-Control
          value: "public, max-age=2592000"
    matches:
    - path:
        type: PathPrefix
        value: /assets
  # Everything else — default
  - backendRefs:
    - name: forgejo-http
      port: 3000
