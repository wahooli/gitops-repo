apiVersion: v1
kind: Service
metadata:
  name: ombi
  namespace: default
  annotations:
    service.cilium.io/global: "true"
    service.cilium.io/affinity: "remote"
spec:
  internalTrafficPolicy: Cluster
  ports:
  - name: http
    port: 3579
    protocol: TCP
    targetPort: http
  type: ClusterIP
