apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vaultwarden-envoy
  namespace: default
spec:
  parentRefs:
  - name: envoy-gw-private
    namespace: envoy-gateway-system
  hostnames:
  - "vault.${domain_wahoo_li:=wahoo.li}"
  rules:
  - backendRefs:
    - name: vaultwarden
      port: 80
