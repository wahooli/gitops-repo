apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base/whisper-asr
- pvc.yaml
images:
- name: onerahmet/openai-whisper-asr-webservice
  newTag: v1.9.1-gpu # {"$imagepolicy": "flux-system:whisper-asr-gpu:tag"}
patches:
- target:
    kind: InferenceService
    name: whisper-asr
  patch: |-
    - op: add
      path: /spec/predictor/runtimeClassName
      value: nvidia
    - op: replace
      path: /spec/predictor/containers/0/resources
      value:
        requests:
          cpu: "1"
          memory: 4Gi
        limits:
          cpu: "2"
          memory: 6Gi
