envFrom:
  envs:
    type: configMap
    useFromChart: false
    name: jellyfin-env
strategy:
  type: Recreate
image:
  tag: "10.11.6" # {"$imagepolicy": "flux-system:jellyfin:tag"}
podAnnotations:
  backup.velero.io/backup-volumes: data
runtimeClassName: nvidia
# hostNetwork: true
dnsConfig:
  options:
  - name: ndots
    value: "1"
  - name: edns0
global:
  labels:
    backupWeekly: "true"
    backupDaily: "true"
    app.kubernetes.io/part-of: jellyfin
service:
  main:
    annotations:
      service.cilium.io/global: "true"
      service.cilium.io/affinity: "local"
      service.cilium.io/global-sync-endpoint-slices: "true"
persistence:
  data:
    enabled: true
    mount:
    - path: /config
      subPath: config
    - path: /cache
      subPath: cache
    spec:
      isPersistentVolumeClaim: true
      accessModes:
      - "ReadWriteOnce"
      resources:
        requests:
          storage: "60Gi"
  config:
    enabled: true
    mount:
    - path: /config/config/logging.json
      subPath: logging.json
    spec:
      useFromChart: false
      configMap:
        name: jellyfin-config
  movies:
    enabled: true
    mount:
    - path: /data/Movies
    spec:
      hostPath:
        path: ${jellyfin_movies_host_path}
        type: Directory
  tv:
    enabled: true
    mount:
    - path: /data/Series
    spec:
      hostPath:
        path: ${jellyfin_tv_host_path}
        type: Directory
  transcode:
    enabled: true
    mount:
    - path: /transcode
    spec:
      emptyDir:
        sizeLimit: 20Gi
        medium: Memory
ingress:
  main:
    enabled: false
