image:
  tag: "v1.7.7" # {"$imagepolicy": "flux-system:crowdsec:tag"}
agent:
  acquisition:
  - namespace: authentik
    podName: authentik-server-*
    program: authentik
    poll_without_inotify: true
  - namespace: default
    podName: mc-router-*
    program: mc-router
    poll_without_inotify: true
  additionalAcquisition:
  - source: file
    filenames:
    - /var/log/pods/envoy-gateway-system_envoy-envoy-gateway-system-envoy-gw-[^p]*_*/envoy/*.log
    labels:
      type: containerd
      program: envoy-gateway
  - source: file
    filenames:
    - /var/log/pods/forgejo_forgejo-*_*/forgejo/*.log
    labels:
      type: containerd
      program: forgejo-ssh
