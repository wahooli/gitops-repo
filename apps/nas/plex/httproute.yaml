apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: plex
  namespace: default
  annotations:
    external-dns.alpha.kubernetes.io/target: gw.nas.${domain_absolutist_it:=absolutist.it}
spec:
  parentRefs:
  - name: internal-gw
    namespace: infrastructure
  hostnames:
  - "plex.${domain_absolutist_it:=absolutist.it}"
  - "plex.${domain_wahoo_li:=wahoo.li}"
  rules:
  - backendRefs:
    - name: plex
      port: 32400
