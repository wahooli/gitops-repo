apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bazarr
  namespace: default
spec:
  parentRefs:
  - name: envoy-gw
    namespace: envoy-gateway-system
  - name: envoy-gw-private
    namespace: envoy-gateway-system
    sectionName: wahooli-https
  hostnames:
  - "bazarr.${domain_wahoo_li:=wahoo.li}"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /outpost.goauthentik.io
    backendRefs:
    - name: ak-outpost-nasse-proxy
      port: 9000
  # Root — no cache
  - backendRefs:
    - name: bazarr
      port: 6767
    filters:
    - type: ResponseHeaderModifier
      responseHeaderModifier:
        set:
        - name: Cache-Control
          value: "no-cache, no-store, must-revalidate"
        - name: Pragma
          value: "no-cache"
    matches:
    - path:
        type: Exact
        value: /
  # Static assets — cached 7 days
  - backendRefs:
    - name: bazarr
      port: 6767
    filters:
    - type: ResponseHeaderModifier
      responseHeaderModifier:
        set:
        - name: Cache-Control
          value: "public, max-age=604800"
    matches:
    - path:
        type: PathPrefix
        value: /assets
    - path:
        type: PathPrefix
        value: /images
  # API — extended timeout
  - backendRefs:
    - name: bazarr
      port: 6767
    matches:
    - path:
        type: PathPrefix
        value: /api
    timeouts:
      request: 300s
      backendRequest: 300s
  # Everything else — default
  - backendRefs:
    - name: bazarr
      port: 6767
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: bazarr-auth
  namespace: default
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: bazarr
  extAuth:
    failOpen: false
    headersToExtAuth:
    - cookie
    - authorization
    - proxy-authorization
    - x-forwarded-for
    - x-forwarded-proto
    - x-real-ip
    - accept
    http:
      backendRefs:
      - name: ak-outpost-nasse-proxy
        namespace: default
        port: 9000
      path: /outpost.goauthentik.io/auth/envoy
      headersToBackend:
      - set-cookie
      - x-authentik-username
      - x-authentik-uid
      - x-authentik-name
      - x-authentik-email
      - x-authentik-groups
      - x-authentik-entitlements
      - x-authentik-jwt
