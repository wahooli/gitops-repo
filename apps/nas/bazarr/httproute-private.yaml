apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bazarr-private
  namespace: default
  annotations:
    external-dns.alpha.kubernetes.io/target: gw.${domain_absolutist_it:=absolutist.it}
spec:
  parentRefs:
  - name: envoy-gw-private
    namespace: envoy-gateway-system
  hostnames:
  - "bazarr.${domain_absolutist_it:=absolutist.it}"
  rules:
  # Root — no cache
  - backendRefs:
    - name: bazarr
      port: 6767
    filters:
    - type: ResponseHeaderModifier
      responseHeaderModifier:
        set:
        - name: Cache-Control
          value: "no-cache, no-store, must-revalidate"
        - name: Pragma
          value: "no-cache"
    matches:
    - path:
        type: Exact
        value: /
  # Static assets — cached 7 days
  - backendRefs:
    - name: bazarr
      port: 6767
    filters:
    - type: ResponseHeaderModifier
      responseHeaderModifier:
        set:
        - name: Cache-Control
          value: "public, max-age=604800"
    matches:
    - path:
        type: PathPrefix
        value: /assets
    - path:
        type: PathPrefix
        value: /images
  # API — extended timeout
  - backendRefs:
    - name: bazarr
      port: 6767
    matches:
    - path:
        type: PathPrefix
        value: /api
    timeouts:
      request: 300s
      backendRequest: 300s
  # Everything else — default
  - backendRefs:
    - name: bazarr
      port: 6767
