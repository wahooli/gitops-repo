apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prowlarr
  namespace: default
  annotations:
    external-dns.alpha.kubernetes.io/target: gw.${domain_absolutist_it:=absolutist.it}
spec:
  parentRefs:
  - name: envoy-gw-private
    namespace: envoy-gateway-system
  hostnames:
  - "prowlarr.${domain_absolutist_it:=absolutist.it}"
  rules:
  # API — extended timeout
  - backendRefs:
    - name: prowlarr
      port: 9696
    matches:
    - path:
        type: PathPrefix
        value: /api
    timeouts:
      request: 900s
      backendRequest: 900s
  # Everything else — default
  - backendRefs:
    - name: prowlarr
      port: 9696
