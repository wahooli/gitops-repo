apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sonarr-private
  namespace: default
  annotations:
    external-dns.alpha.kubernetes.io/target: gw.${domain_absolutist_it:=absolutist.it}
spec:
  parentRefs:
  - name: envoy-gw-private
    namespace: envoy-gateway-system
  hostnames:
  - "sonarr.${domain_absolutist_it:=absolutist.it}"
  rules:
  # API — extended timeout
  - backendRefs:
    - name: sonarr
      port: 8989
    matches:
    - path:
        type: PathPrefix
        value: /api
    timeouts:
      request: 300s
      backendRequest: 300s
  # Everything else — default
  - backendRefs:
    - name: sonarr
      port: 8989
